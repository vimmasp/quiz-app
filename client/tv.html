<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-size:40px">

<h1>🏆 RANKING</h1>
<ul id="r"></ul>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
const socket = io("https://TU-BACKEND.onrender.com");

socket.on("showRanking",(data)=>{
  r.innerHTML = data.map((p,i)=>`<li>${i+1}. ${p.nombre} - ${p.puntos}</li>`).join("");
});
</script>

</body>
</html>
