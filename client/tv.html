<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

h1{
  font-size:50px;
}

#pregunta{
  font-size:40px;
  margin:20px;
}

#timer{
  font-size:80px;
  color:#f1c40f;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.bar{
  background:#333;
  border-radius:10px;
  overflow:hidden;
  height:50px;
  position:relative;
}

.fill{
  height:100%;
  text-align:left;
  padding-left:10px;
  line-height:50px;
  font-weight:bold;
}

.red{background:#e74c3c;}
.blue{background:#3498db;}
.green{background:#2ecc71;}
.yellow{background:#f1c40f;color:black;}

#ranking{
  margin-top:30px;
}

.player{
  font-size:30px;
  margin:10px;
  padding:10px;
  border-radius:10px;
  background:#222;
}

.top1{background:#f1c40f;color:black;}
.top2{background:#bdc3c7;color:black;}
.top3{background:#cd7f32;color:black;}
</style>
</head>

<body>

<div class="container">

<h1>🎮 QUIZ EN VIVO</h1>

<div id="pregunta"></div>
<div id="timer"></div>

<!-- 📊 ESTADÍSTICAS -->
<div class="stats" id="stats"></div>

<div id="ranking"></div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const socket = io("https://quiz-backend-liq5.onrender.com");

let total = 0;

// ❓ NUEVA PREGUNTA
socket.on("question",(q)=>{

  document.getElementById("pregunta").innerText = q.pregunta;
  document.getElementById("ranking").innerHTML = "";

  total = 0;

  const colors = ["red","blue","green","yellow"];

  document.getElementById("stats").innerHTML = q.opciones.map((o,i)=>
    `<div class="bar">
      <div id="bar${i}" class="fill ${colors[i]}" style="width:0%">
        ${o} (0)
      </div>
    </div>`
  ).join("");
});

// ⏱️ TIMER
socket.on("timer",(t)=>{
  document.getElementById("timer").innerText = t;
});

// 📊 AVANCE EN TIEMPO REAL
socket.on("stats",(data)=>{

  const conteo = data.conteo;
  total = conteo.reduce((a,b)=>a+b,0);

  conteo.forEach((v,i)=>{

    let porcentaje = total > 0 ? (v/total)*100 : 0;

    const bar = document.getElementById("bar"+i);

    if(bar){
      bar.style.width = porcentaje + "%";
      bar.innerText = `${bar.innerText.split("(")[0]} (${v})`;
    }

  });
});

// 🏆 RANKING FINAL
socket.on("ranking",(data)=>{

  document.getElementById("pregunta").innerText = "🏆 RESULTADOS";
  document.getElementById("timer").innerText = "";
  document.getElementById("stats").innerHTML = "";

  document.getElementById("ranking").innerHTML =
    data.map((p,i)=>{

      let clase = "";
      if(i === 0) clase = "top1";
      else if(i === 1) clase = "top2";
      else if(i === 2) clase = "top3";

      return `<div class="player ${clase}">
        ${i+1}. ${p.nombre} - ${p.puntos} pts
      </div>`;

    }).join("");
});
</script>

</body>
</html>
