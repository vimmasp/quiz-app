<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

input{
  padding:12px;
  margin:5px;
  width:80%;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}

.btn{
  height:100px;
  font-size:18px;
  font-weight:bold;
  color:white;
}

.red{background:#e74c3c;}
.blue{background:#3498db;}
.green{background:#2ecc71;}
.yellow{background:#f1c40f;}

#timer{
  font-size:50px;
  margin:10px;
}

#status{
  margin-top:10px;
  color:#f1c40f;
}

#ranking{
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎮 Jugador</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="pin" placeholder="PIN"><br>

<button onclick="join()">Entrar</button>

<h3 id="q"></h3>
<div id="timer"></div>
<div id="status"></div>

<div class="grid" id="ops"></div>

<div id="ranking"></div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const socket = io("https://quiz-backend-liq5.onrender.com");

let bloqueado = false;
let joined = false;
let nombreJugador = "";

// 👥 ENTRAR AL JUEGO
function join(){

  const nombreVal = document.getElementById("nombre").value.trim();
  const pinVal = document.getElementById("pin").value.trim();

  if(nombreVal === "" || pinVal === ""){
    alert("Ingresa nombre y PIN");
    return;
  }

  nombreJugador = nombreVal;

  socket.emit("join", { nombre: nombreVal, pin: pinVal });

  joined = true;

  document.getElementById("status").innerText = "Esperando preguntas...";
  document.getElementById("ranking").innerHTML = "";

  console.log("Entrando a sala:", pinVal);
}

// ❓ RECIBIR PREGUNTA
socket.on("question",(q)=>{

  bloqueado = false;

  document.getElementById("ranking").innerHTML = "";
  document.getElementById("q").innerText = q.pregunta;
  document.getElementById("status").innerText = "Responde rápido 🚀";

  const colors = ["red","blue","green","yellow"];

  document.getElementById("ops").innerHTML = q.opciones.map((o,i)=>
    `<button class="btn ${colors[i]}" onclick="ans(${i})">${o}</button>`
  ).join("");

});

// ⏱️ TIMER
socket.on("timer",(t)=>{
  document.getElementById("timer").innerText = t;
});

// 🏆 RANKING FINAL
socket.on("ranking",(data)=>{

  console.log("RANKING RECIBIDO:", data);

  document.getElementById("q").innerText = "🏆 RESULTADOS";
  document.getElementById("ops").innerHTML = "";
  document.getElementById("timer").innerText = "";
  document.getElementById("status").innerText = "";

  // 🔥 Mostrar ranking general
  document.getElementById("ranking").innerHTML =
    data.map((p,i)=>`<div>${i+1}. ${p.nombre} - ${p.puntos} pts</div>`).join("");

  // ⭐ Mostrar posición personal
  const posicion = data.findIndex(p => p.nombre === nombreJugador);

  if(posicion !== -1){
    const lugar = posicion + 1;

    document.getElementById("status").innerText =
      `🎯 Terminaste en posición #${lugar}`;
  }

});

// ✅ RESPONDER
function ans(i){

  if(!joined){
    alert("Primero entra al juego");
    return;
  }

  if(bloqueado) return;

  bloqueado = true;

  document.getElementById("status").innerText = "Respuesta enviada ✅";

  const pinVal = document.getElementById("pin").value.trim();

  socket.emit("answer", {
    pin: pinVal,
    respuesta: i
  });

}
</script>

</body>
</html>
