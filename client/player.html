<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<style>
body{background:#121212;color:white;text-align:center;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{height:100px;border:none;border-radius:15px;color:white;font-size:18px;}
.red{background:#e74c3c;} .blue{background:#3498db;}
.green{background:#2ecc71;} .yellow{background:#f1c40f;}
</style>
</head>

<body>

<h2>Jugador</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="pin" placeholder="PIN"><br>

<button onclick="join()">Entrar</button>

<h3 id="q"></h3>
<h1 id="timer"></h1>

<div class="grid" id="ops"></div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const socket = io("https://TU-BACKEND.onrender.com");
let bloqueado=false;

function join(){
  socket.emit("join",{nombre:nombre.value,pin:pin.value});
}

socket.on("question",(q)=>{
  bloqueado=false;

  document.getElementById("q").innerText=q.pregunta;

  const colors=["red","blue","green","yellow"];

  ops.innerHTML = q.opciones.map((o,i)=>
    `<button class="btn ${colors[i]}" onclick="ans(${i})">${o}</button>`
  ).join("");
});

socket.on("timer",(t)=> timer.innerText=t);

function ans(i){
  if(bloqueado) return;
  bloqueado=true;

  socket.emit("answer",{pin:pin.value,respuesta:i});
}
</script>

</body>
</html>
