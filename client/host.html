<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Quiz</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

input{
  padding:10px;
  margin:5px;
  width:80%;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#3498db;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#2980b9;
}

#pin{
  font-size:40px;
  color:#2ecc71;
  margin:20px;
}

ul{
  list-style:none;
  padding:0;
}

#status{
  margin-top:10px;
  color:#f1c40f;
}
</style>
</head>

<body>

<!-- 🔐 PROTECCIÓN LOGIN -->
<script>
if(localStorage.getItem("auth") !== "ok"){
  window.location = "login.html";
}
</script>

<div class="container">

<h1>🎮 HOST PANEL</h1>

<button onclick="logout()">Cerrar sesión</button>
<button onclick="crear()">Crear partida</button>

<h2 id="pin"></h2>

<h3>📝 Crear pregunta</h3>

<input id="pregunta" placeholder="Escribe la pregunta"><br>

<input id="op1" placeholder="Opción 1"><br>
<input id="op2" placeholder="Opción 2"><br>
<input id="op3" placeholder="Opción 3"><br>
<input id="op4" placeholder="Opción 4"><br>

<input id="correcta" placeholder="Respuesta correcta (0-3)"><br>

<button onclick="agregar()">➕ Agregar pregunta</button>
<button onclick="iniciar()">🚀 Iniciar juego</button>

<div id="status"></div>

<h3>👥 Jugadores</h3>
<ul id="players"></ul>

</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const socket = io("https://quiz-backend-liq5.onrender.com");

let currentPin = "";

// 🔐 Logout
function logout(){
  localStorage.removeItem("auth");
  window.location = "login.html";
}

// 🎮 Crear partida
function crear(){

  fetch("https://quiz-backend-liq5.onrender.com/create")
  .then(r => r.json())
  .then(d => {

    currentPin = d.pin;

    document.getElementById("pin").innerText = "PIN: " + d.pin;
    document.getElementById("status").innerText = "Partida creada ✅";

    // unir host a la sala

  })
  .catch(err => {
    console.error(err);
    alert("Error al crear partida");
  });
}

// ➕ Agregar pregunta
function agregar(){

  if(currentPin === ""){
    alert("Primero crea una partida");
    return;
  }

  if(pregunta.value === "" || op1.value === "" || op2.value === "" || op3.value === "" || op4.value === ""){
    alert("Completa todos los campos");
    return;
  }

  if(correcta.value === ""){
    alert("Ingresa la respuesta correcta (0-3)");
    return;
  }

  const q = {
    pregunta: pregunta.value,
    opciones: [op1.value, op2.value, op3.value, op4.value],
    correcta: parseInt(correcta.value)
  };

  socket.emit("addQuestion", {
    pin: currentPin,
    pregunta: q
  });

  document.getElementById("status").innerText = "Pregunta agregada ✅";

  // limpiar campos
  pregunta.value = "";
  op1.value = "";
  op2.value = "";
  op3.value = "";
  op4.value = "";
  correcta.value = "";
}

// 🚀 Iniciar juego
function iniciar(){

  if(currentPin === ""){
    alert("Primero crea una partida");
    return;
  }

  document.getElementById("status").innerText = "Juego iniciado 🚀";

  socket.emit("startGame", {
    pin: currentPin
  });
}

// 👥 Lista de jugadores
socket.on("players", (p) => {

  document.getElementById("players").innerHTML =
    p.map(x => `<li>${x.nombre} - ${x.puntos} pts</li>`).join("");

});
</script>

</body>
</html>
