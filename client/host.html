<!DOCTYPE html>
<html>
<body style="background:#111;color:white;text-align:center">

<h1>HOST</h1>
<button onclick="crear()">Crear partida</button>
<h2 id="pin"></h2>

<button onclick="pregunta()">Iniciar pregunta</button>

<ul id="players"></ul>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
const socket = io("https://TU-BACKEND.onrender.com");
let currentPin="";

function crear(){
  fetch("https://TU-BACKEND.onrender.com/create")
  .then(r=>r.json())
  .then(d=>{
    currentPin=d.pin;
    pin.innerText="PIN: "+d.pin;
  });
}

function pregunta(){
  fetch("https://TU-BACKEND.onrender.com/question")
  .then(r=>r.json())
  .then(q=>{
    socket.emit("startQuestion",{pin:currentPin,pregunta:q,tiempo:15});
  });
}

socket.on("players",(p)=>{
  players.innerHTML=p.map(x=>`<li>${x.nombre}</li>`).join("");
});
</script>

</body>
</html>
