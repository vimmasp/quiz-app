<!DOCTYPE html>
<html>
<body>

<button onclick="crear()">Crear partida</button>
<h2 id="pin"></h2>

<button onclick="pregunta()">Enviar pregunta</button>
<button onclick="ranking()">Ver ranking</button>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>

const socket = io("https://quiz-backend-liq5.onrender.com");
let currentPin = "";

function crear(){
  fetch("https://TU-BACKEND.onrender.com/create")
  .then(r=>r.json())
  .then(d=>{
    currentPin = d.pin;
    pin.innerText = "PIN: " + d.pin;
  });
}

function pregunta(){
  fetch("https://TU-BACKEND.onrender.com/question")
  .then(r=>r.json())
  .then(q=>{
    socket.emit("startQuestion", {
      pin: currentPin,
      pregunta: q,
      tiempo: 20
    });
  });
}

function ranking(){
  socket.emit("ranking", currentPin);
}

</script>

</body>
</html>
