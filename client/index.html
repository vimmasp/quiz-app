<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Live</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1f1c2c,#928dab);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:95%;
  max-width:500px;
  background: rgba(0,0,0,0.4);
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  text-align:center;
}

input{
  width:90%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btn{
  height:100px;
  font-size:18px;
  font-weight:bold;
}

.red{background:#ff4757;}
.blue{background:#1e90ff;}
.green{background:#2ed573;}
.yellow{background:#ffa502;}

#timer{
  font-size:50px;
  margin:10px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.fade{
  animation:fadeIn 0.5s;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="card fade">

<h2>🎮 Quiz Live</h2>

<input id="nombre" placeholder="Tu nombre">
<input id="pin" placeholder="PIN del juego">

<button onclick="join()">Entrar</button>

<h3 id="q"></h3>
<div id="timer"></div>

<div class="grid" id="ops"></div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const socket = io("https://TU-BACKEND.onrender.com");
let bloqueado = false;

function join(){
  socket.emit("joinGame", {
    nombre: nombre.value,
    pin: pin.value
  });
}

socket.on("question",(data)=>{
  bloqueado = false;

  q.innerText = data.pregunta;

  const colors = ["red","blue","green","yellow"];

  ops.innerHTML = data.opciones.map((o,i)=>
    `<button class="btn ${colors[i]}" onclick="ans(${i})">${o}</button>`
  ).join("");

  ops.classList.add("fade");
});

socket.on("timer",(t)=>{
  timer.innerText = t;
});

socket.on("end", ()=>{
  bloqueado = true;
});

function ans(i){
  if(bloqueado) return;

  bloqueado = true;

  socket.emit("answer", {
    pin: pin.value,
    respuesta: i,
    correcta: 0
  });
}
</script>

</body>
</html>
